<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>GvAI</title>

<style>
body {
  margin: 0;
  font-family: system-ui, -apple-system, sans-serif;
  background: #0b1220;
  color: #e5e7eb;
}

.header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 16px 20px;
  background: #0f172a;
  border-bottom: 1px solid #1f2937;
}

.logo {
  width: 42px;
  height: 42px;
  border-radius: 10px;
}

.title {
  font-size: 20px;
  font-weight: 600;
}

.subtitle {
  font-size: 12px;
  color: #9ca3af;
}

.main {
  display: flex;
  height: calc(100vh - 70px);
}

.sidebar {
  width: 260px;
  border-right: 1px solid #1f2937;
  padding: 16px;
}

.chat {
  flex: 1;
  display: flex;
  flex-direction: column;
}

.messages {
  flex: 1;
  padding: 20px;
  overflow-y: auto;
}

.input-bar {
  display: flex;
  padding: 16px;
  border-top: 1px solid #1f2937;
  gap: 10px;
}

input {
  flex: 1;
  padding: 12px;
  border-radius: 8px;
  border: none;
  outline: none;
}

button {
  padding: 12px 16px;
  border-radius: 8px;
  border: none;
  background: #3b82f6;
  color: white;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="header">
  <img src="/web/gv-logo.png" class="logo"/>
  <div>
    <div class="title">GvAI</div>
    <div class="subtitle">Chat-native survivability intelligence</div>
  </div>
</div>

<div class="main">

  <div class="sidebar">
    <h4>Conversations</h4>
    <p>New chat coming soon...</p>
  </div>

  <div class="chat">
    <div class="messages" id="messages">
      <p><b>GvAI:</b> System ready.</p>
    </div>

    <div class="input-bar">
      <input id="input" placeholder="Message GvAI..." />
      <button onclick="send()">Send</button>
    </div>
  </div>

</div>

<script>
async function send() {
  const input = document.getElementById("input");
  const messages = document.getElementById("messages");

  const text = input.value;
  if (!text) return;

  messages.innerHTML += "<p><b>You:</b> " + text + "</p>";
  input.value = "";

  try {
    const res = await fetch("/api/chat", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({message: text})
    });

    const data = await res.json();

    messages.innerHTML += "<p><b>GvAI:</b> " + (data.reply || "...") + "</p>";
  } catch (e) {
    messages.innerHTML += "<p><b>Error:</b> API not reachable</p>";
  }
}
</script>

</body>
</html>
