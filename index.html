<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GvAI</title>
  <style>
    :root {
      --bg: #081224;
      --panel: #0f1b33;
      --panel-2: #132345;
      --line: #21365f;
      --text: #e8eefc;
      --muted: #9db0d7;
      --accent: #80aaff;
      --accent-2: #5e8fff;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      background: radial-gradient(circle at top, #0b1830 0%, var(--bg) 55%);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100%;
    }

    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px 20px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      background: rgba(6, 12, 24, 0.82);
      backdrop-filter: blur(10px);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .logo {
      width: 42px;
      height: 42px;
      border-radius: 10px;
      object-fit: contain;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.06);
      padding: 4px;
    }

    .brand h1 {
      margin: 0;
      font-size: 20px;
      line-height: 1.1;
    }

    .brand p {
      margin: 2px 0 0 0;
      font-size: 12px;
      color: var(--muted);
    }

    .shell {
      width: min(980px, calc(100% - 24px));
      margin: 18px auto;
      display: flex;
      flex-direction: column;
      gap: 14px;
      flex: 1;
    }

    .hero {
      background: linear-gradient(180deg, rgba(20,34,63,0.95), rgba(11,22,43,0.95));
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 18px;
      padding: 18px;
    }

    .hero h2 {
      margin: 0 0 8px 0;
      font-size: 22px;
    }

    .hero p {
      margin: 0;
      color: var(--muted);
    }

    .chat {
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-height: 62vh;
      background: linear-gradient(180deg, rgba(15,27,51,0.95), rgba(9,18,36,0.95));
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 18px;
      padding: 14px;
    }

    .messages {
      display: flex;
      flex-direction: column;
      gap: 12px;
      overflow-y: auto;
      padding: 4px;
      flex: 1;
      min-height: 420px;
      max-height: 68vh;
    }

    .msg {
      max-width: min(760px, 92%);
      border-radius: 16px;
      padding: 12px 14px;
      border: 1px solid rgba(255,255,255,0.07);
      white-space: pre-wrap;
      line-height: 1.45;
      box-shadow: 0 10px 30px rgba(0,0,0,0.16);
    }

    .msg.user {
      align-self: flex-end;
      background: linear-gradient(180deg, #22407a, #193460);
    }

    .msg.assistant {
      align-self: flex-start;
      background: linear-gradient(180deg, #101d37, #0d1930);
    }

    .msg .meta {
      display: block;
      font-size: 12px;
      color: #b9c8e8;
      margin-bottom: 6px;
      opacity: 0.9;
    }

    .composer {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      border-top: 1px solid rgba(255,255,255,0.08);
      padding-top: 12px;
    }

    textarea {
      flex: 1;
      resize: vertical;
      min-height: 62px;
      max-height: 180px;
      padding: 14px 14px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(4, 10, 20, 0.8);
      color: var(--text);
      outline: none;
      font: inherit;
    }

    textarea::placeholder {
      color: #8094bf;
    }

    button {
      border: 0;
      border-radius: 14px;
      padding: 14px 18px;
      background: linear-gradient(180deg, var(--accent), var(--accent-2));
      color: white;
      font-weight: 600;
      cursor: pointer;
      min-width: 96px;
    }

    button:disabled {
      opacity: 0.55;
      cursor: wait;
    }

    .footer-note {
      text-align: center;
      color: var(--muted);
      font-size: 12px;
      margin-top: 4px;
      margin-bottom: 16px;
    }

    .tiny-links {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .tiny-links a {
      color: var(--accent);
      text-decoration: none;
      font-size: 12px;
    }

    @media (max-width: 720px) {
      .shell {
        width: calc(100% - 14px);
      }

      .composer {
        flex-direction: column;
        align-items: stretch;
      }

      button {
        width: 100%;
      }

      .msg {
        max-width: 100%;
      }
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="brand">
      <img class="logo" src="web/gv-logo.png" alt="GvAI logo" />
      <div>
        <h1>GvAI</h1>
        <p>Chat-native survivability intelligence</p>
      </div>
    </div>
  </header>

  <main class="shell">
    <section class="hero">
      <h2>Talk to GvAI</h2>
      <p>Ask a question, test an idea, or push on the God Variable work directly.</p>
      <div class="tiny-links">
        <a href="dashboard/">Dashboard</a>
        <a href="https://api.gvai.io/api/chat" target="_blank" rel="noopener noreferrer">API</a>
      </div>
    </section>

    <section class="chat">
      <div id="messages" class="messages">
        <div class="msg assistant">
          <span class="meta">GvAI</span>
          I’m here. What do you want to work on today?
        </div>
      </div>

      <div class="composer">
        <textarea id="prompt" placeholder="Message GvAI..."></textarea>
        <button id="sendBtn" type="button">Send</button>
      </div>
    </section>

    <div class="footer-note">Root is chat now. Dashboard is still available from the link above.</div>
  </main>

  <script>
    const API_URL = "https://api.gvai.io/api/chat";
    const messagesEl = document.getElementById("messages");
    const promptEl = document.getElementById("prompt");
    const sendBtn = document.getElementById("sendBtn");

    function addMessage(role, text) {
      const div = document.createElement("div");
      div.className = `msg ${role}`;
      const meta = role === "user" ? "You" : "GvAI";
      div.innerHTML = `<span class="meta">${meta}</span>${escapeHtml(text).replace(/\\n/g, "<br>")}`;
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return div;
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function extractReply(payload) {
      if (!payload) return "";
      return (
        payload.reply ||
        payload.answer ||
        payload.response ||
        payload.output ||
        payload.message ||
        ""
      );
    }

    async function sendMessage() {
      const text = promptEl.value.trim();
      if (!text) return;

      addMessage("user", text);
      promptEl.value = "";
      sendBtn.disabled = true;

      const typing = addMessage("assistant", "Thinking...");

      try {
        const res = await fetch(API_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message: text })
        });

        if (!res.ok) {
          throw new Error(`HTTP ${res.status}`);
        }

        const data = await res.json();
        const reply = extractReply(data) || "I got a response back, but it didn’t include a standard reply field.";
        typing.innerHTML = `<span class="meta">GvAI</span>${escapeHtml(reply).replace(/\\n/g, "<br>")}`;
      } catch (err) {
        typing.innerHTML = `<span class="meta">GvAI</span>API request failed: ${escapeHtml(err.message)}.`;
      } finally {
        sendBtn.disabled = false;
        promptEl.focus();
        messagesEl.scrollTop = messagesEl.scrollHeight;
      }
    }

    sendBtn.addEventListener("click", sendMessage);
    promptEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });
  </script>
</body>
</html>
