<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GvAI</title>
  <style>
    :root {
      --bg: #071121;
      --bg2: #0b1830;
      --panel: rgba(14, 27, 52, 0.95);
      --panel-2: rgba(18, 35, 69, 0.98);
      --line: rgba(255,255,255,0.08);
      --text: #e9efff;
      --muted: #98acd6;
      --accent: #82abff;
      --accent-2: #5c8cff;
      --user: #22437d;
      --assistant: #101f3d;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top, var(--bg2) 0%, var(--bg) 58%);
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .header {
      position: sticky;
      top: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 14px 18px;
      border-bottom: 1px solid var(--line);
      background: rgba(6, 12, 24, 0.84);
      backdrop-filter: blur(10px);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .logo {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      object-fit: contain;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.06);
      padding: 4px;
      flex: 0 0 auto;
    }

    .brand-text {
      min-width: 0;
    }

    .brand-text h1 {
      margin: 0;
      font-size: 19px;
      line-height: 1.05;
    }

    .brand-text p {
      margin: 3px 0 0 0;
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .top-links {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .top-links a {
      color: var(--accent);
      text-decoration: none;
      font-size: 12px;
      border: 1px solid rgba(255,255,255,0.08);
      padding: 7px 10px;
      border-radius: 999px;
      background: rgba(255,255,255,0.02);
    }

    .shell {
      width: min(1180px, calc(100% - 20px));
      margin: 16px auto 0 auto;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .hero {
      background: linear-gradient(180deg, rgba(18,35,68,0.95), rgba(10,22,44,0.95));
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 18px 18px 16px 18px;
      max-width: 1100px;
      width: 100%;
      margin: 0 auto;
    }

    .hero h2 {
      margin: 0 0 8px 0;
      font-size: 31px;
      line-height: 1.05;
    }

    .hero p {
      margin: 0;
      color: var(--muted);
      font-size: 15px;
    }

    .chat {
      flex: 1;
      min-height: 72vh;
      display: flex;
      flex-direction: column;
      background: linear-gradient(180deg, rgba(14,27,52,0.96), rgba(7,17,33,0.98));
      border: 1px solid var(--line);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.28);
      max-width: 1100px;
      width: 100%;
      margin: 0 auto;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
      align-items: center;
    }

    .row {
      display: flex;
      width: 100%;
      max-width: 920px;
    }

    .row.user {
      justify-content: flex-end;
    }

    .row.assistant {
      justify-content: flex-start;
    }

    .msg {
      width: fit-content;
      max-width: 720px;
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,0.07);
      padding: 12px 14px 13px 14px;
      line-height: 1.48;
      white-space: pre-wrap;
      box-shadow: 0 12px 32px rgba(0,0,0,0.16);
    }

    .msg.user {
      background: linear-gradient(180deg, #274b8b, #1d3868);
    }

    .msg.assistant {
      background: linear-gradient(180deg, #112343, #0c1a31);
    }

    .meta {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
      font-size: 12px;
      color: #bed0f2;
      opacity: 0.95;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: #8cb0ff;
      box-shadow: 0 0 10px rgba(140,176,255,0.8);
    }

    .msg-text {
      font-size: 16px;
    }

    .composer-wrap {
      border-top: 1px solid var(--line);
      padding: 14px;
      background: rgba(5, 11, 22, 0.35);
    }

    .composer {
      display: flex;
      gap: 12px;
      align-items: flex-end;
    }

    textarea {
      flex: 1;
      min-height: 66px;
      max-height: 180px;
      resize: vertical;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.1);
      outline: none;
      background: rgba(3, 9, 18, 0.9);
      color: var(--text);
      padding: 16px;
      font: inherit;
      line-height: 1.4;
    }

    textarea::placeholder {
      color: #7e95c2;
    }

    .send {
      border: 0;
      border-radius: 16px;
      min-width: 108px;
      height: 58px;
      padding: 0 18px;
      background: linear-gradient(180deg, var(--accent), var(--accent-2));
      color: white;
      font-weight: 700;
      font-size: 15px;
      cursor: pointer;
      box-shadow: 0 12px 28px rgba(92,140,255,0.25);
    }

    .send:disabled {
      opacity: 0.6;
      cursor: wait;
    }

    .footer-note {
      text-align: center;
      color: var(--muted);
      font-size: 12px;
      margin: 10px 0 16px 0;
    }

    @media (max-width: 760px) {
      .header {
        align-items: flex-start;
        flex-direction: column;
      }

      .top-links {
        width: 100%;
      }

      .hero h2 {
        font-size: 25px;
      }

      .composer {
        flex-direction: column;
        align-items: stretch;
      }

      .send {
        width: 100%;
        height: 54px;
      }

      .msg {
        max-width: 100%;
      }

      .shell {
        width: calc(100% - 12px);
      }
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="brand">
      <img class="logo" src="web/gv-logo.png" alt="GvAI logo" />
      <div class="brand-text">
        <h1>GvAI</h1>
        <p>Chat-native survivability intelligence</p>
      </div>
    </div>

    <div class="top-links">
      <a href="dashboard/">Dashboard</a>
      <a href="https://api.gvai.io/api/chat" target="_blank" rel="noopener noreferrer">API</a>
    </div>
  </header>

  <main class="shell">
    <section class="hero">
      <h2>Talk to GvAI</h2>
      <p>Ask a question, test an idea, or push directly on the God Variable work.</p>
    </section>

    <section class="chat">
      <div id="messages" class="messages">
        <div class="row assistant">
          <div class="msg assistant">
            <div class="meta"><span class="dot"></span><span>GvAI</span></div>
            <div class="msg-text">I’m here. What do you want to work on today?</div>
          </div>
        </div>
      </div>

      <div class="composer-wrap">
        <div class="composer">
          <textarea id="prompt" placeholder="Message GvAI..."></textarea>
          <button id="sendBtn" class="send" type="button">Send</button>
        </div>
      </div>
    </section>

    <div class="footer-note">Root is chat. Dashboard is still available from the link above.</div>
  </main>

  <script>
    const API_URL = "https://api.gvai.io/api/chat";
    const messagesEl = document.getElementById("messages");
    const promptEl = document.getElementById("prompt");
    const sendBtn = document.getElementById("sendBtn");

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function extractReply(payload) {
      if (!payload) return "";
      return payload.reply || payload.answer || payload.response || payload.output || payload.message || "";
    }

    function addMessage(role, text) {
      const row = document.createElement("div");
      row.className = `row ${role}`;

      const card = document.createElement("div");
      card.className = `msg ${role}`;

      const meta = document.createElement("div");
      meta.className = "meta";
      meta.innerHTML = `<span class="dot"></span><span>${role === "user" ? "You" : "GvAI"}</span>`;

      const body = document.createElement("div");
      body.className = "msg-text";
      body.innerHTML = escapeHtml(text).replace(/\n/g, "<br>");

      card.appendChild(meta);
      card.appendChild(body);
      row.appendChild(card);
      messagesEl.appendChild(row);
      messagesEl.scrollTop = messagesEl.scrollHeight;

      return body;
    }

    async function sendMessage() {
      const text = promptEl.value.trim();
      if (!text) return;

      addMessage("user", text);
      promptEl.value = "";
      sendBtn.disabled = true;

      const thinkingBody = addMessage("assistant", "GvAI is thinking...");

      try {
        const res = await fetch(API_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message: text })
        });

        if (!res.ok) {
          throw new Error(`HTTP ${res.status}`);
        }

        const data = await res.json();
        const reply = extractReply(data) || "I got a response back, but it didn’t include a standard reply field.";
        thinkingBody.innerHTML = escapeHtml(reply).replace(/\n/g, "<br>");
      } catch (err) {
        thinkingBody.innerHTML = `API request failed: ${escapeHtml(err.message)}.`;
      } finally {
        sendBtn.disabled = false;
        promptEl.focus();
        messagesEl.scrollTop = messagesEl.scrollHeight;
      }
    }

    sendBtn.addEventListener("click", sendMessage);

    promptEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });
  </script>
</body>
</html>
