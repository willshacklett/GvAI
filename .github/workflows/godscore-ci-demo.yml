name: GodScore CI Demo

on:
  workflow_dispatch:
    inputs:
      scenario:
        description: "Scenario to simulate"
        required: true
        default: "collapse"
        type: choice
        options:
          - stable
          - recoverable
          - collapse
      enforce:
        description: "Fail build on critical/collapse"
        required: true
        default: false
        type: boolean
      fail_on_warning:
        description: "Fail build on warning too"
        required: true
        default: false
        type: boolean
  push:
    branches:
      - main

jobs:
  godscore:
    runs-on: ubuntu-latest

    outputs:
      godscore: ${{ steps.godscore.outputs.godscore }}
      status: ${{ steps.godscore.outputs.status }}
      passed: ${{ steps.godscore.outputs.passed }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install numpy pandas matplotlib

      - name: Run GodScore CI
        id: godscore
        env:
          GODSCORE_SCENARIO: ${{ github.event.inputs.scenario || 'collapse' }}
          GODSCORE_ENFORCE: ${{ github.event.inputs.enforce || 'false' }}
          GODSCORE_FAIL_ON_WARNING: ${{ github.event.inputs.fail_on_warning || 'false' }}
        run: |
          PYTHONPATH=. python scripts/run_godscore_action.py

      - name: Show outputs
        if: always()
        run: |
          echo "godscore=${{ steps.godscore.outputs.godscore }}"
          echo "status=${{ steps.godscore.outputs.status }}"
          echo "passed=${{ steps.godscore.outputs.passed }}"

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: godscore-ci-result
          path: ci/action_result.json
