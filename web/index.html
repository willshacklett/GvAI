<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>GvAI</title>
</head>
<body>

<textarea id="input" placeholder="Message GvAI..." style="width:400px;height:100px;"></textarea>
<br><br>
<button onclick="sendMessage()">Send</button>

<pre id="output"></pre>

<script>
async function sendMessage() {
  const input = document.getElementById("input").value;

  try {
    const res = await fetch("https://api.gvai.io/score", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        text: input
      })
    });

    const data = await res.json();
    document.getElementById("output").textContent = JSON.stringify(data, null, 2);

  } catch (err) {
    console.error(err);
    document.getElementById("output").textContent = "ERROR: " + err.message;
  }
}
</script>

</body>
</html>
