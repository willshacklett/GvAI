<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/png" href="/gv-tab.png?v=2">

<meta charset="UTF-8" />
  <title>GvAI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, sans-serif;
      background: #0b1220;
      color: #e5e7eb;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 20px;
      background: #0f172a;
      border-bottom: 1px solid #1f2937;
    }

    .logo {
      width: 40px;
      height: 40px;
      border-radius: 10px;
    }

    .title {
      font-size: 20px;
      font-weight: 600;
    }

    .subtitle {
      font-size: 12px;
      color: #9ca3af;
      margin-top: 2px;
    }

    .content {
      padding: 20px;
    }
  </style>

<style id="gv-voice-style">
  #gv-talk-btn {
    position: fixed;
    right: 18px;
    bottom: 90px;
    z-index: 9999;
    background: #0b2a63;
    color: #f2c14e;
    border: 1px solid rgba(242, 193, 78, 0.45);
    border-radius: 999px;
    padding: 10px 14px;
    font: 600 14px/1 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    cursor: pointer;
    box-shadow: 0 10px 24px rgba(0,0,0,0.28);
  }

  #gv-talk-btn.listening {
    animation: gvPulse 1.1s infinite;
    background: #12377d;
  }

  #gv-talk-status {
    position: fixed;
    right: 18px;
    bottom: 52px;
    z-index: 9999;
    background: rgba(5, 15, 35, 0.9);
    color: #e8edf7;
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 10px;
    padding: 6px 10px;
    font: 500 12px/1.2 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    display: none;
    max-width: 240px;
  }

  @keyframes gvPulse {
    0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(242,193,78,0.45); }
    70% { transform: scale(1.03); box-shadow: 0 0 0 14px rgba(242,193,78,0); }
    100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(242,193,78,0); }
  }

  @media (max-width: 700px) {
    #gv-talk-btn {
      right: 14px;
      bottom: 82px;
      padding: 9px 12px;
      font-size: 13px;
    }
    #gv-talk-status {
      right: 14px;
      bottom: 46px;
      max-width: 200px;
    }
  }
</style>

</head>

<body>
  <div class="header">
    <img src="/web/gv-logo.png" class="logo" />
    <div>
      <div class="title">GvAI</div>
      <div class="subtitle">Chat-native survivability intelligence</div>
    </div>
  </div>

  <div class="content">
    <h2>GvAI is running</h2>
    <p>Your system is now clean, stable, and rendering correctly.</p>
  </div>

<button id="gv-talk-btn" type="button" aria-label="Talk to GvAI">🎤 Talk</button>
<div id="gv-talk-status" aria-live="polite"></div>


<script id="gv-voice-script">
(function () {
  if (window.__gvVoiceInstalled) return;
  window.__gvVoiceInstalled = true;

  const talkBtn = document.getElementById("gv-talk-btn");
  const statusEl = document.getElementById("gv-talk-status");

  function setStatus(msg, show = true) {
    if (!statusEl) return;
    statusEl.textContent = msg || "";
    statusEl.style.display = show && msg ? "block" : "none";
  }

  function findInput() {
    const selectors = [
      "#message-input",
      "#user-input",
      "#chat-input",
      "textarea",
      "input[type='text']",
      "input:not([type])"
    ];
    for (const s of selectors) {
      const el = document.querySelector(s);
      if (el) return el;
    }
    return null;
  }

  function setInputValue(el, value) {
    if (!el) return false;
    el.focus();
    const prior = el.value || "";
    el.value = prior ? (prior.trimEnd() + " " + value) : value;
    el.dispatchEvent(new Event("input", { bubbles: true }));
    el.dispatchEvent(new Event("change", { bubbles: true }));
    return true;
  }

  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    talkBtn.addEventListener("click", function () {
      setStatus("Voice input is not supported in this browser.");
      setTimeout(() => setStatus("", false), 2500);
    });
    return;
  }

  const recognition = new SpeechRecognition();
  recognition.lang = "en-US";
  recognition.interimResults = true;
  recognition.continuous = false;
  recognition.maxAlternatives = 1;

  let listening = false;
  let finalTranscript = "";

  function startListening() {
    finalTranscript = "";
    try {
      recognition.start();
    } catch (e) {
      setStatus("Mic is already starting. Try again.");
      setTimeout(() => setStatus("", false), 1800);
    }
  }

  function stopListening() {
    try { recognition.stop(); } catch (e) {}
  }

  talkBtn.addEventListener("click", function () {
    if (listening) {
      stopListening();
      return;
    }
    startListening();
  });

  recognition.onstart = function () {
    listening = true;
    talkBtn.classList.add("listening");
    talkBtn.textContent = "🎙️ Listening";
    setStatus("Listening… tap again to stop.");
  };

  recognition.onresult = function (event) {
    let interim = "";
    for (let i = event.resultIndex; i < event.results.length; i++) {
      const text = event.results[i][0].transcript;
      if (event.results[i].isFinal) {
        finalTranscript += text + " ";
      } else {
        interim += text;
      }
    }
    setStatus(interim ? ("Hearing: " + interim) : "Listening…");
  };

  recognition.onerror = function (event) {
    listening = false;
    talkBtn.classList.remove("listening");
    talkBtn.textContent = "🎤 Talk";

    const map = {
      "not-allowed": "Microphone permission blocked.",
      "service-not-allowed": "Microphone service blocked.",
      "no-speech": "No speech heard.",
      "audio-capture": "No microphone detected.",
      "network": "Speech service network issue."
    };
    setStatus(map[event.error] || ("Voice error: " + event.error));
    setTimeout(() => setStatus("", false), 2500);
  };

  recognition.onend = function () {
    const wasListening = listening;
    listening = false;
    talkBtn.classList.remove("listening");
    talkBtn.textContent = "🎤 Talk";

    const transcript = finalTranscript.trim();
    if (transcript) {
      const input = findInput();
      if (input) {
        setInputValue(input, transcript);
        setStatus("Transcript added to message box.");
      } else {
        setStatus("Could not find chat input.");
      }
    } else if (wasListening) {
      setStatus("No transcript captured.");
    }

    setTimeout(() => setStatus("", false), 1800);
  };
})();
</script>

</body>
</html>
